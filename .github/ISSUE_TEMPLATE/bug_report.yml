name: 🐛 Bug report
description: Something in Hyred isn't working the way it should
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more concrete this is, the faster we can fix it.

        **Security issues:** please use [SECURITY.md](https://github.com/Ritika8081/Hyred/blob/main/SECURITY.md) instead of a public issue.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do and what went wrong?
      placeholder: I clicked X on page Y and instead of Z, I saw…
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: I expected…
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered list, please. If we can't reproduce it, we can't fix it.
      placeholder: |
        1. Open `/tools/match`
        2. Paste a JD
        3. Click "Run match"
        4. …
    validations:
      required: true

  - type: input
    id: route
    attributes:
      label: Affected route or file
      placeholder: e.g. /tools/match or src/lib/ai.ts

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Brave
        - Arc
        - Other (mention in description)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS + version
      placeholder: macOS 14.2, Windows 11, Ubuntu 22.04…
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Hyred version / commit SHA
      placeholder: e.g. main @ a1b2c3d, or "latest demo"

  - type: textarea
    id: console
    attributes:
      label: Console errors / logs
      description: If applicable, paste any errors from the browser console or terminal.
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or video
      description: Drag images / a Loom link here if it helps explain the issue.

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and didn't find a duplicate
          required: true
        - label: I read the [Code of Conduct](https://github.com/Ritika8081/Hyred/blob/main/CODE_OF_CONDUCT.md)
          required: true
